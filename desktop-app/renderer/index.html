<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typing Sound Customizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    .container {
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .titlebar h1 {
      font-size: 18px;
      font-weight: 800;
    }

    .titlebar h1 span {
      background: linear-gradient(135deg, #8b5cf6, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .status {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .status.active {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
    }

    .status.paused {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }

    .toggle-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      color: #e2e8f0;
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 11px;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }

    .toggle-btn:hover { border-color: rgba(255,255,255,0.3); }

    .close-btn {
      background: none;
      border: none;
      color: rgba(226, 232, 240, 0.3);
      font-size: 18px;
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      -webkit-app-region: no-drag;
    }

    .close-btn:hover { background: rgba(239, 68, 68, 0.3); color: #ef4444; }

    .minimize-btn {
      background: none;
      border: none;
      color: rgba(226, 232, 240, 0.3);
      font-size: 18px;
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      -webkit-app-region: no-drag;
    }

    .minimize-btn:hover { background: rgba(255, 255, 255, 0.1); color: #e2e8f0; }

    .section-label {
      font-size: 12px;
      color: rgba(226, 232, 240, 0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .packs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
      -webkit-app-region: no-drag;
    }

    .pack {
      background: #16213e;
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .pack:hover { background: #1a2744; }

    .pack.selected {
      border-color: #6c2bd9;
      background: rgba(108, 43, 217, 0.1);
      box-shadow: 0 0 20px rgba(108, 43, 217, 0.2);
    }

    .pack .emoji { font-size: 28px; margin-bottom: 4px; }
    .pack .name { font-size: 13px; font-weight: 600; }

    .volume-section {
      margin-bottom: 20px;
      -webkit-app-region: no-drag;
    }

    .volume-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .volume-row span { font-size: 18px; }

    input[type="range"] {
      flex: 1;
      accent-color: #6c2bd9;
      height: 6px;
    }

    .volume-value {
      font-size: 13px;
      color: rgba(226, 232, 240, 0.5);
      min-width: 35px;
      text-align: right;
    }

    .keypress-display {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #16213e;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .keypress-display .last-key {
      font-size: 48px;
      font-weight: 800;
      opacity: 0.15;
      transition: all 0.1s;
    }

    .keypress-display .last-key.flash {
      opacity: 0.6;
      transform: scale(1.2);
    }

    .keypress-display .counter {
      font-size: 12px;
      color: rgba(226, 232, 240, 0.3);
      margin-top: 4px;
    }

    .flash-overlay {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.05s;
      pointer-events: none;
      border-radius: 16px;
    }

    .flash-overlay.active { opacity: 0.15; }

    .footer {
      text-align: center;
      font-size: 10px;
      color: rgba(226, 232, 240, 0.2);
    }

    .footer a {
      color: rgba(226, 232, 240, 0.3);
      text-decoration: none;
    }

    /* License activation screen */
    .license-screen {
      position: fixed;
      inset: 0;
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      z-index: 100;
      -webkit-app-region: drag;
    }

    .license-screen .emoji { font-size: 64px; margin-bottom: 16px; }
    .license-screen h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .license-screen h2 span {
      background: linear-gradient(135deg, #8b5cf6, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .license-screen p { font-size: 13px; color: rgba(226,232,240,0.5); margin-bottom: 20px; text-align: center; }

    .license-input-row {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 340px;
      -webkit-app-region: no-drag;
    }

    .license-input {
      flex: 1;
      background: #16213e;
      border: 1px solid rgba(255,255,255,0.1);
      color: #e2e8f0;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-family: monospace;
      outline: none;
    }

    .license-input:focus { border-color: #6c2bd9; }

    .license-btn {
      background: #6c2bd9;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }

    .license-btn:hover { background: #8b5cf6; }
    .license-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .license-error {
      color: #ef4444;
      font-size: 12px;
      margin-top: 10px;
    }

    .license-link {
      color: rgba(226,232,240,0.3);
      font-size: 11px;
      margin-top: 16px;
      text-decoration: none;
      -webkit-app-region: no-drag;
      cursor: pointer;
    }

    .license-link:hover { color: rgba(226,232,240,0.5); }

    .license-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      color: rgba(226,232,240,0.3);
      font-size: 18px;
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      -webkit-app-region: no-drag;
    }

    .license-close:hover { background: rgba(239,68,68,0.3); color: #ef4444; }
  </style>
</head>
<body>
  <!-- License activation screen -->
  <div class="license-screen" id="licenseScreen" style="display:none;">
    <button class="license-close" id="licenseCloseBtn" title="Quit">✕</button>
    <div class="emoji">⌨️</div>
    <h2>Typing Sound <span>Customizer</span></h2>
    <p>Enter your license key to unlock the app.<br>Purchase at stupidapps.io</p>
    <div class="license-input-row">
      <input type="text" class="license-input" id="licenseInput" placeholder="SA-XXXX-XXXX" />
      <button class="license-btn" id="licenseBtn">Activate</button>
    </div>
    <div class="license-error" id="licenseError"></div>
    <a class="license-link" id="buyLink">Don't have a key? Buy now</a>
  </div>

  <div class="container" id="mainApp">
    <div class="titlebar">
      <h1>⌨️ Typing <span>Sounds</span></h1>
      <div class="controls">
        <span class="status active" id="status">ACTIVE</span>
        <button class="toggle-btn" id="toggleBtn">Pause</button>
        <button class="minimize-btn" id="minimizeBtn" title="Minimize">−</button>
        <button class="close-btn" id="closeBtn" title="Quit app">✕</button>
      </div>
    </div>

    <div class="section-label">Sound Pack</div>
    <div class="packs" id="packs"></div>

    <div class="volume-section">
      <div class="section-label">Volume</div>
      <div class="volume-row">
        <span>🔊</span>
        <input type="range" id="volume" min="0" max="1" step="0.05" value="0.7" />
        <span class="volume-value" id="volumeValue">70%</span>
      </div>
    </div>

    <div class="keypress-display" id="display">
      <div class="flash-overlay" id="flashOverlay"></div>
      <div class="last-key" id="lastKey">⌨️</div>
      <div class="counter">Keys pressed: <span id="keyCount">0</span></div>
    </div>

    <div class="footer">
      <a href="https://stupidapps.io">StupidApps.io</a> — Apps that shouldn't exist. But do.
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
