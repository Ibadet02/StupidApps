<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ChargeGasm</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    .container {
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .titlebar h1 { font-size: 20px; font-weight: 800; }
    .titlebar h1 span {
      background: linear-gradient(135deg, #8b5cf6, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .window-btns {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    .win-btn {
      background: none;
      border: none;
      color: rgba(226,232,240,0.3);
      font-size: 16px;
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
    }

    .win-btn:hover { background: rgba(255,255,255,0.1); color: #e2e8f0; }
    .win-btn.close:hover { background: rgba(239,68,68,0.3); color: #ef4444; }

    .main-display {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #16213e;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      transition: background 0.3s;
    }

    .main-display.plugged {
      background: #1a2e1a;
      border-color: rgba(34,197,94,0.3);
    }

    .main-display.unplugged {
      background: #2e1a1a;
      border-color: rgba(239,68,68,0.3);
    }

    .flash-overlay {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.1s;
      pointer-events: none;
      border-radius: 20px;
    }

    .flash-overlay.active { opacity: 0.3; }

    .emoji { font-size: 64px; margin-bottom: 10px; transition: transform 0.3s; }
    .emoji.bounce { animation: bounce 0.5s ease; }

    .status-text {
      font-size: 16px;
      font-weight: 600;
      color: rgba(226,232,240,0.5);
      transition: color 0.3s;
    }

    .status-text.plugged { color: #22c55e; }
    .status-text.unplugged { color: #ef4444; }

    .event-text {
      font-size: 13px;
      color: rgba(226,232,240,0.3);
      margin-top: 8px;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: no-drag;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toggle-label { font-size: 13px; color: rgba(226,232,240,0.5); }

    .toggle {
      width: 44px;
      height: 24px;
      background: #333;
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      border: none;
    }

    .toggle.on { background: #6c2bd9; }

    .toggle::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: left 0.2s;
    }

    .toggle.on::after { left: 23px; }

    .volume-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .volume-row span { font-size: 16px; }

    input[type="range"] {
      width: 80px;
      accent-color: #6c2bd9;
    }

    .footer {
      text-align: center;
      margin-top: 12px;
      font-size: 10px;
      color: rgba(226,232,240,0.15);
    }

    /* License screen */
    .license-screen {
      position: fixed;
      inset: 0;
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      z-index: 100;
      -webkit-app-region: drag;
    }

    .license-screen .l-emoji { font-size: 56px; margin-bottom: 12px; }
    .license-screen h2 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .license-screen h2 span {
      background: linear-gradient(135deg, #8b5cf6, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .license-screen p {
      font-size: 12px;
      color: rgba(226,232,240,0.5);
      margin-bottom: 18px;
      text-align: center;
    }

    .license-input-row {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 300px;
      -webkit-app-region: no-drag;
    }

    .license-input {
      flex: 1;
      background: #16213e;
      border: 1px solid rgba(255,255,255,0.1);
      color: #e2e8f0;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      font-family: monospace;
      outline: none;
    }

    .license-input:focus { border-color: #6c2bd9; }

    .license-btn {
      background: #6c2bd9;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }

    .license-btn:hover { background: #8b5cf6; }

    .license-error { color: #ef4444; font-size: 11px; margin-top: 8px; }

    .license-link {
      color: rgba(226,232,240,0.3);
      font-size: 11px;
      margin-top: 14px;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }

    .license-link:hover { color: rgba(226,232,240,0.5); }

    .l-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      color: rgba(226,232,240,0.3);
      font-size: 16px;
      cursor: pointer;
      border-radius: 6px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
    }

    .l-close:hover { background: rgba(239,68,68,0.3); color: #ef4444; }

    .sound-selectors {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .selector-row {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .selector-label {
      font-size: 11px;
      color: rgba(226,232,240,0.4);
      font-weight: 600;
    }

    .sound-select {
      background: #16213e;
      color: #e2e8f0;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 12px;
      outline: none;
      cursor: pointer;
      -webkit-appearance: none;
    }

    .sound-select:hover { border-color: rgba(255,255,255,0.2); }
    .sound-select:focus { border-color: #6c2bd9; }

    .select-with-btn {
      display: flex;
      gap: 4px;
    }

    .select-with-btn .sound-select { flex: 1; }

    .preview-btn {
      background: #6c2bd9;
      color: white;
      border: none;
      width: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
    }

    .preview-btn:hover { background: #8b5cf6; }
    .preview-btn.playing { background: #ef4444; }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }
  </style>
</head>
<body>
  <!-- License screen -->
  <div class="license-screen" id="licenseScreen" style="display:none;">
    <button class="l-close" id="licenseCloseBtn">✕</button>
    <div class="l-emoji">🔌</div>
    <h2>Charge<span>Gasm</span></h2>
    <p>Enter your license key to unlock.<br>Purchase at stupidapps.io</p>
    <div class="license-input-row">
      <input type="text" class="license-input" id="licenseInput" placeholder="SA-XXXX-XXXX" />
      <button class="license-btn" id="licenseBtn">Activate</button>
    </div>
    <div class="license-error" id="licenseError"></div>
    <div class="license-link" id="buyLink">Don't have a key? Buy now</div>
  </div>

  <!-- Main app -->
  <div class="container" id="mainApp">
    <div class="titlebar">
      <h1>🔌 Charge<span>Gasm</span></h1>
      <div class="window-btns">
        <button class="win-btn" id="minimizeBtn">−</button>
        <button class="win-btn close" id="closeBtn">✕</button>
      </div>
    </div>

    <div class="sound-selectors" style="-webkit-app-region: no-drag;">
      <div class="selector-row">
        <span class="selector-label">⚡ Plug sound</span>
        <div class="select-with-btn">
          <select id="plugSelect" class="sound-select"></select>
          <button class="preview-btn" id="plugPreview">▶</button>
        </div>
      </div>
      <div class="selector-row">
        <span class="selector-label">🔌 Unplug sound</span>
        <div class="select-with-btn">
          <select id="unplugSelect" class="sound-select"></select>
          <button class="preview-btn" id="unplugPreview">▶</button>
        </div>
      </div>
    </div>

    <div class="main-display" id="display">
      <div class="flash-overlay" id="flash"></div>
      <div class="emoji" id="emoji">🔋</div>
      <div class="status-text" id="statusText">Waiting for charger...</div>
      <div class="event-text" id="eventText">Plug or unplug to hear the magic</div>
    </div>

    <div class="controls">
      <div class="toggle-row">
        <span class="toggle-label">Loop</span>
        <button class="toggle on" id="loopBtn"></button>
      </div>
      <div class="volume-row">
        <span id="muteBtn" style="cursor:pointer; -webkit-app-region: no-drag;">🔊</span>
        <input type="range" id="volume" min="0" max="1" step="0.05" value="0.8" />
      </div>
    </div>

    <div class="footer">StupidApps.io — Apps that shouldn't exist.</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
